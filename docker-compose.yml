services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: eld
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eld
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-local}
      DEBUG: "True"
      ORS_API_KEY: ${ORS_API_KEY:-}
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      - postgres

volumes:
  postgres_data:
